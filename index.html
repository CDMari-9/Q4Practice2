<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Q4 Practice 2</title>
</head>
<body>
    <h1>Switch Statement</h1>\

    <script>
        let team ="Green";//string

        switch(team){
            case "Green":
                alert("Go Green Hornets!");
                break;
            case "Blue":
                alert("Go Blue Bears!");   
                break;
            case "Yellow":
                alert("Go Yellow Tiger!")   ;
                break; 
            
            default:
                alert("No Team name.")    
        }

    </script>
</body>
</html>
